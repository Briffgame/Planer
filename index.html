<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Planner</title>
<!-- Стили v3 + расширение для Идей -->
<style>
:root{--acc:#5B5FEF;--bg:#fff;--bg2:#f5f5f7;--bg3:#e8e8ec;--card:#fff;--border:#e2e2e7;--text:#111114;--text2:#6b6b7a;--text3:#a0a0b0;--nav-h:62px;--safe-b:env(safe-area-inset-bottom,0px);--r:12px;--r-sm:8px;font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;}
.dark{--bg:#0f0f12;--bg2:#1a1a1f;--bg3:#252530;--card:#1a1a1f;--border:#2d2d38;--text:#f0f0f5;--text2:#8888a0;--text3:#55556a;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:var(--text);background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:9px 13px;font-size:14px;outline:none;width:100%;transition:border-color .15s;}
input:focus,textarea:focus,select:focus{border-color:var(--acc)}
#app{display:flex;flex-direction:column;height:100dvh}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px;padding-top:calc(10px + env(safe-area-inset-top,0px));background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;z-index:20;}
#views{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow-y:auto;display:none;background:var(--bg)}
.view.active{display:block}
#nav{display:flex;background:var(--bg);border-top:1px solid var(--border);padding-bottom:calc(5px + var(--safe-b));flex-shrink:0;z-index:20;}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 1px 2px;gap:2px;font-size:9px;font-weight:600;color:var(--text3);transition:color .12s;}
.nav-tab svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none}
.nav-tab.active{color:var(--acc)}
/* Стили для идей */
.ideas-outer{padding:16px;min-height:100%}
.idea-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div id="app">
  <div id="topbar"><div id="topbar-title">Сегодня</div></div>
  <div id="views">
    <div class="view active" id="view-today"></div>
    <div class="view" id="view-week"></div>
    <div class="view" id="view-tasks"><div class="tasks-outer" id="tasks-outer"></div></div>
    <div class="view" id="view-habits"><div class="hb-wrap" id="hb-wrap"></div></div>
    <div class="view" id="view-notes"><div class="notes-grid" id="notes-grid"></div></div>
    <div class="view" id="view-projects"><div class="proj-outer" id="proj-outer"></div></div>
    <!-- Раздел Идеи -->
    <div class="view" id="view-ideas"><div class="ideas-outer" id="ideas-outer"></div></div>
  </div>
  <nav id="nav">
    <button class="nav-tab active" data-tab="today">День</button>
    <button class="nav-tab" data-tab="week">Неделя</button>
    <button class="nav-tab" data-tab="tasks">Задачи</button>
    <button class="nav-tab" data-tab="ideas" style="color:var(--acc)">Идеи</button>
    <button class="nav-tab" data-tab="habits">Привычки</button>
    <button class="nav-tab" data-tab="projects">Проекты</button>
  </nav>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyDBHw85SZcyfT2cwkPoEOuTb_qUVnyJcVw", projectId: "planer-ca414", appId: "1:28677358123:web:bcfcd306a02d001bf4e06e" };
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const SYNC_DOC = doc(db, 'planer', 'data');

const S = { get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}, set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}} };

// Стейт
let tasks = S.get('pl_tasks', []);
let ideas = S.get('pl_ideas', []); 
let habits = S.get('pl_habits', { habits: [], log: {} });
let projects = S.get('pl_projects', []);
let notes = S.get('pl_notes', []);

function saveAll() {
  S.set('pl_tasks', tasks);
  S.set('pl_ideas', ideas);
  S.set('pl_habits', habits);
  S.set('pl_projects', projects);
  S.set('pl_notes', notes);
  try { setDoc(SYNC_DOC, { tasks, ideas, habits, projects, notes }); } catch(e){}
}

/* --- ЛОГИКА ИДЕЙ --- */
window.renderIdeas = function() {
  const container = document.getElementById('ideas-outer');
  container.innerHTML = `
    <div style="margin-bottom:16px; background:var(--card); padding:16px; border-radius:var(--r); border:1px solid var(--border)">
      <input type="text" id="new-idea-input" placeholder="Новая идея...">
      <button onclick="addIdea()" style="width:100%; padding:10px; background:var(--acc); color:#fff; border-radius:8px; margin-top:8px; font-weight:bold">Добавить</button>
    </div>
    <div id="ideas-list"></div>
  `;
  const list = document.getElementById('ideas-list');
  ideas.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'idea-card';
    div.innerHTML = `<div style="font-size:14px; font-weight:500">${item.title}</div>
      <button onclick="delIdea(${index})" style="color:var(--text2); font-size:12px">Удалить</button>`;
    list.appendChild(div);
  });
};

window.addIdea = function() {
  const input = document.getElementById('new-idea-input');
  if(!input.value) return;
  ideas.push({ id: Math.random().toString(36).slice(2), title: input.value });
  input.value = '';
  saveAll();
  renderIdeas();
};

window.delIdea = function(idx) {
  ideas.splice(idx, 1);
  saveAll();
  renderIdeas();
};

/* --- ВАШИ СУЩЕСТВУЮЩИЕ ФУНКЦИИ РЕНДЕРА (ВАЖНО НЕ УДАЛЯТЬ) --- */
window.renderToday = () => { /* Ваш код */ };
window.renderWeek = () => { /* Ваш код */ };
window.renderTasks = () => { /* Ваш код */ };
window.renderHabits = () => { /* Ваш код */ };
window.renderNotes = () => { /* Ваш код */ };
window.renderProjects = () => { /* Ваш код */ };

/* --- РОУТЕР --- */
window.switchTab = function(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  document.querySelector(`.nav-tab[data-tab="${tab}"]`).classList.add('active');
  
  if(tab === 'today') renderToday();
  if(tab === 'week') renderWeek();
  if(tab === 'tasks') renderTasks();
  if(tab === 'habits') renderHabits();
  if(tab === 'notes') renderNotes();
  if(tab === 'projects') renderProjects();
  if(tab === 'ideas') renderIdeas();
};

document.querySelectorAll('.nav-tab').forEach(t => {
  t.addEventListener('click', () => switchTab(t.dataset.tab));
});

// Старт
switchTab('today');
</script>
</body>
</html>
