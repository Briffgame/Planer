<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Planner</title>
<style>
:root{--acc:#5B5FEF;--bg:#fff;--bg2:#f5f5f7;--bg3:#e8e8ec;--card:#fff;--border:#e2e2e7;--text:#111114;--text2:#6b6b7a;--text3:#a0a0b0;--nav-h:62px;--safe-b:env(safe-area-inset-bottom,0px);--r:12px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:sans-serif;}
#app{display:flex;flex-direction:column;height:100dvh}
#topbar{padding:15px;border-bottom:1px solid var(--border);font-weight:bold;}
#views{flex:1;overflow-y:auto;padding:15px;}
.view{display:none;}
.view.active{display:block;}
nav{display:flex;border-top:1px solid var(--border);background:#fff;padding-bottom:env(safe-area-inset-bottom);}
.nav-tab{flex:1;padding:15px;text-align:center;font-size:12px;color:var(--text2);cursor:pointer;}
.nav-tab.active{color:var(--acc);font-weight:bold;}
.card{background:var(--bg2);padding:15px;border-radius:var(--r);margin-bottom:10px;}
input{width:100%;padding:10px;margin-bottom:10px;border:1px solid var(--border);border-radius:8px;}
button{background:var(--acc);color:#fff;padding:10px;border:none;border-radius:8px;width:100%;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">Планировщик</div>
  <div id="views">
    <div class="view active" id="view-today"><h2>Сегодня</h2><p>Ваши дела на сегодня.</p></div>
    <div class="view" id="view-week"><h2>Неделя</h2><p>Планирование недели.</p></div>
    <div class="view" id="view-tasks"><h2>Задачи</h2><div id="tasks-list"></div></div>
    <div class="view" id="view-ideas"><h2>Идеи</h2><div id="ideas-outer"></div></div>
    <div class="view" id="view-habits"><h2>Привычки</h2></div>
    <div class="view" id="view-projects"><h2>Проекты</h2></div>
  </div>
  <nav id="nav">
    <div class="nav-tab active" data-tab="today">День</div>
    <div class="nav-tab" data-tab="week">Неделя</div>
    <div class="nav-tab" data-tab="tasks">Задачи</div>
    <div class="nav-tab" data-tab="ideas">Идеи</div>
    <div class="nav-tab" data-tab="habits">Привычки</div>
    <div class="nav-tab" data-tab="projects">Проекты</div>
  </nav>
</div>

<script type="module">
// Инициализация
const S = { get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}, set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}} };

let ideas = S.get('pl_ideas', []);

// Логика переключения вкладок
window.switchTab = function(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  document.querySelector(`.nav-tab[data-tab="${tab}"]`).classList.add('active');
  if(tab === 'ideas') renderIdeas();
};

document.querySelectorAll('.nav-tab').forEach(t => {
  t.addEventListener('click', () => switchTab(t.dataset.tab));
});

// Рендер идей
window.renderIdeas = function() {
  const container = document.getElementById('ideas-outer');
  container.innerHTML = `
    <input type="text" id="new-idea-input" placeholder="Новая идея...">
    <button onclick="addIdea()">Добавить</button>
    <div id="ideas-list" style="margin-top:20px;"></div>
  `;
  const list = document.getElementById('ideas-list');
  ideas.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `${item.title} <button style="background:#ff4444; margin-top:5px;" onclick="delIdea(${index})">Удалить</button>`;
    list.appendChild(div);
  });
};

window.addIdea = function() {
  const input = document.getElementById('new-idea-input');
  if(!input.value) return;
  ideas.push({ title: input.value });
  S.set('pl_ideas', ideas);
  input.value = '';
  renderIdeas();
};

window.delIdea = function(idx) {
  ideas.splice(idx, 1);
  S.set('pl_ideas', ideas);
  renderIdeas();
};

</script>
</body>
</html>
