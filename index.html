<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<meta name="theme-color" content="#ffffff" id="theme-meta">
<title>Planner</title>
<style>
:root{
  --acc:#5B5FEF;
  --bg:#fff;--bg2:#f5f5f7;--bg3:#e8e8ec;
  --card:#fff;--border:#e2e2e7;
  --text:#111114;--text2:#6b6b7a;--text3:#a0a0b0;
  --nav-h:62px;--safe-b:env(safe-area-inset-bottom,0px);
  --r:12px;--r-sm:8px;
  font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;
}
.dark{
  --bg:#0f0f12;--bg2:#1a1a1f;--bg3:#252530;
  --card:#1a1a1f;--border:#2d2d38;
  --text:#f0f0f5;--text2:#8888a0;--text3:#55556a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{
  font-family:inherit;color:var(--text);
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:var(--r-sm);padding:9px 13px;font-size:14px;outline:none;width:100%;
  transition:border-color .15s;
}
input:focus,textarea:focus,select:focus{border-color:var(--acc)}
textarea{resize:vertical;min-height:80px}

/* ─── LAYOUT ─── */
#app{display:flex;flex-direction:column;height:100dvh}
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px 8px;
  padding-top:calc(10px + env(safe-area-inset-top,0px));
  background:var(--bg);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:20;
}
#topbar-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
#topbar-right{display:flex;gap:4px}
.icon-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg2);font-size:15px;flex-shrink:0;transition:background .12s}
.icon-btn:active{background:var(--bg3)}
#views{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow-y:auto;display:none;background:var(--bg)}
.view.active{display:block}

/* ─── BOTTOM NAV ─── */
#nav{
  display:flex;background:var(--bg);
  border-top:1px solid var(--border);
  padding-bottom:calc(5px + var(--safe-b));
  flex-shrink:0;z-index:20;
}
.nav-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:6px 1px 2px;gap:2px;
  font-size:9px;font-weight:600;letter-spacing:0;
  color:var(--text3);
  transition:color .12s;
}
.nav-tab svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nav-tab.active{color:var(--acc)}

/* ─── FAB ─── */
#fab{
  position:fixed;right:16px;bottom:calc(var(--nav-h) + 12px + var(--safe-b));
  width:48px;height:48px;border-radius:50%;background:var(--acc);color:#fff;
  box-shadow:0 4px 16px rgba(91,95,239,.4);
  display:flex;align-items:center;justify-content:center;
  z-index:30;transition:transform .12s;
}
#fab:active{transform:scale(.9)}

/* ─── IDEAS VIEW ─── */
.ideas-outer{padding:16px;min-height:100%;overflow-x:hidden}
.stat-box{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg2);padding:12px;border-radius:var(--r);text-align:center}
.stat-num{font-size:24px;font-weight:700}
.stat-lbl{font-size:11px;color:var(--text2);text-transform:uppercase}
.idea-form{background:var(--card);padding:16px;border-radius:var(--r);border:1px solid var(--border);margin-bottom:20px}
.idea-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px}
.idea-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.idea-chk{width:20px;height:20px;border-radius:50%;border:2px solid var(--acc);flex-shrink:0}
.idea-chk.done{background:var(--acc)}
.idea-title{font-weight:600;flex:1}
.idea-comment{font-size:12px;color:var(--text2);margin-bottom:8px}
.idea-date-input{font-size:11px;background:var(--bg2);padding:4px 8px;border-radius:6px;cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="topbar-title">Сегодня</div>
    <div id="topbar-right">
      <button class="icon-btn" id="btn-dark">🌙</button>
      <button class="icon-btn" id="btn-settings">⚙️</button>
    </div>
  </div>

  <div id="views">
    <div class="view active" id="view-today"></div>
    <div class="view" id="view-week"></div>
    <div class="view" id="view-tasks"><div class="tasks-outer" id="tasks-outer"></div></div>
    <div class="view" id="view-habits"><div class="hb-wrap" id="hb-wrap"></div></div>
    
    <!-- НОВЫЙ РАЗДЕЛ ИДЕИ -->
    <div class="view" id="view-ideas">
        <div class="ideas-outer" id="ideas-outer"></div>
    </div>

    <div class="view" id="view-projects"><div class="proj-outer" id="proj-outer"></div></div>
  </div>

  <nav id="nav">
    <button class="nav-tab active" data-tab="today">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      День
    </button>
    <button class="nav-tab" data-tab="week">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="7" y1="15" x2="7" y2="15" stroke-width="3"/><line x1="12" y1="15" x2="12" y2="15" stroke-width="3"/><line x1="17" y1="15" x2="17" y2="15" stroke-width="3"/></svg>
      Неделя
    </button>
    <button class="nav-tab" data-tab="tasks">
      <svg viewBox="0 0 24 24"><line x1="9" y1="7" x2="20" y2="7"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="17" x2="20" y2="17"/><circle cx="4" cy="7" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="17" r="1.5" fill="currentColor" stroke="none"/></svg>
      Задачи
    </button>
    <!-- ЗАМЕНА: ИДЕИ ВМЕСТО ЗАМЕТОК -->
    <button class="nav-tab" data-tab="ideas">
      <svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/><circle cx="12" cy="12" r="10"/></svg>
      Идеи
    </button>
    <button class="nav-tab" data-tab="habits">
      <svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
      Привычки
    </button>
    <button class="nav-tab" data-tab="projects">
      <svg viewBox="0 0 24 24"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg>
      Проекты
    </button>
  </nav>
</div>

<button id="fab" aria-label="Добавить">+</button>

<script type="module">
/* ... (Логика Firebase и инициализации остается прежней) ... */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyDBHw85SZcyfT2cwkPoEOuTb_qUVnyJcVw", projectId: "planer-ca414", appId: "1:28677358123:web:bcfcd306a02d001bf4e06e" };
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const SYNC_DOC = doc(db, 'planer', 'data');

const S = {
  get(k, d) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};

// State
let tasks = S.get('pl_tasks', []);
let ideas = S.get('pl_ideas', []); // НОВЫЙ State
let settings = S.get('pl_settings', { dark: false, accent: '#5B5FEF' });

// --- ИДЕИ: ЛОГИКА ---
function renderIdeas() {
    const container = document.getElementById('ideas-outer');
    const planned = ideas.length;
    const done = ideas.filter(i => i.status === 'done').length;

    container.innerHTML = `
        <div class="stat-box">
            <div class="stat-card"><div class="stat-num">${planned}</div><div class="stat-lbl">Всего</div></div>
            <div class="stat-card"><div class="stat-num">${done}</div><div class="stat-lbl">Отснято</div></div>
        </div>
        <div class="idea-form">
            <input type="text" id="idea-title" placeholder="Название идеи..." style="margin-bottom:6px">
            <textarea id="idea-comment" placeholder="Комментарий (что купить/подготовить)..." style="margin-bottom:6px"></textarea>
            <button class="btn btn-p" onclick="addIdea()" style="width:100%">Добавить идею</button>
        </div>
        <div id="ideas-list"></div>
    `;

    const list = document.getElementById('ideas-list');
    ideas.forEach(idea => {
        const div = document.createElement('div');
        div.className = 'idea-card';
        div.innerHTML = `
            <div class="idea-header">
                <div class="idea-chk ${idea.status === 'done' ? 'done' : ''}" onclick="toggleIdea('${idea.id}')"></div>
                <div class="idea-title">${idea.title}</div>
                <input type="date" value="${idea.date || ''}" class="idea-date-input" onchange="scheduleIdea('${idea.id}', this.value)">
            </div>
            <div class="idea-comment">${idea.comment || 'Без комментариев'}</div>
        `;
        list.appendChild(div);
    });
}

window.addIdea = () => {
    const title = document.getElementById('idea-title').value;
    const comment = document.getElementById('idea-comment').value;
    if(!title) return;
    ideas.push({ id: Math.random().toString(36).substr(2,9), title, comment, status: 'todo', date: null });
    saveAll();
    renderIdeas();
};

window.toggleIdea = (id) => {
    const idea = ideas.find(i => i.id === id);
    if(idea) {
        idea.status = idea.status === 'done' ? 'todo' : 'done';
        saveAll();
        renderIdeas();
    }
};

window.scheduleIdea = (id, date) => {
    const idea = ideas.find(i => i.id === id);
    idea.date = date;
    
    // Синхронизация с календарем (создаем таску)
    if(date) {
        tasks.push({ 
            id: 'task_' + id, 
            title: `Снять: ${idea.title}`, 
            date: date, 
            status: 'todo' 
        });
    } else {
        tasks = tasks.filter(t => t.id !== 'task_' + id);
    }
    
    saveAll();
    renderIdeas();
};

function saveAll() {
    S.set('pl_tasks', tasks);
    S.set('pl_ideas', ideas);
    // ... остальной сейв
}

// Убедитесь, что функции switchTab и render вызывают renderIdeas() при выборе вкладки
function switchTab(tab) {
    // ... существующая логика переключения ...
    if(tab === 'ideas') renderIdeas();
}

// Примечание: Убедитесь, что в основной логике приложения (которую вы не меняли) 
// при добавлении новой вкладки 'ideas' срабатывает корректный рендер.
</script>
</body>
</html>
