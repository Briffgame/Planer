<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Planner</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #fff; }
        .view { display: none; padding: 20px; }
        .view.active { display: block; }
        .nav { display: flex; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #ccc; background: #eee; }
        .nav-btn { flex: 1; padding: 15px; text-align: center; cursor: pointer; }
        .nav-btn.active { background: #ddd; font-weight: bold; }
    </style>
</head>
<body>

<div id="view-today" class="view active"><h1>Сегодня</h1><p>Это вкладка Сегодня</p></div>
<div id="view-ideas" class="view">
    <h1>Идеи</h1>
    <input type="text" id="idea-input" placeholder="Введите идею">
    <button onclick="addIdea()">Добавить</button>
    <div id="ideas-list"></div>
</div>

<div class="nav">
    <div class="nav-btn active" onclick="switchTab('today', this)">Сегодня</div>
    <div class="nav-btn" onclick="switchTab('ideas', this)">Идеи</div>
</div>

<script>
    console.log("Скрипт загрузился!");

    // Переключение вкладок
    function switchTab(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById('view-' + id).classList.add('active');
        el.classList.add('active');
    }

    // Идеи
    let ideas = JSON.parse(localStorage.getItem('my_ideas') || '[]');

    function renderIdeas() {
        const list = document.getElementById('ideas-list');
        list.innerHTML = '';
        ideas.forEach((val, i) => {
            list.innerHTML += `<div>${val} <button onclick="delIdea(${i})">Удалить</button></div>`;
        });
    }

    function addIdea() {
        const input = document.getElementById('idea-input');
        if(!input.value) return;
        ideas.push(input.value);
        localStorage.setItem('my_ideas', JSON.stringify(ideas));
        input.value = '';
        renderIdeas();
    }

    function delIdea(i) {
        ideas.splice(i, 1);
        localStorage.setItem('my_ideas', JSON.stringify(ideas));
        renderIdeas();
    }

    // Запуск при старте
    renderIdeas();
</script>

</body>
</html>
